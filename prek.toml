# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

default_install_hook_types = [
  "pre-commit",
  "commit-msg",
  "pre-push",
]
default_stages = ["pre-commit"]

[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.4.0"
hooks = [
  {
    id = "conventional-pre-commit",
    stages = ["commit-msg"],
    args = ["feat", "fix", "build", "ci", "chore", "docs", "drop", "edit",
     "perf", "polish", "root", "refactor", "revert", "style", "temp", "tests"]
  }
]

[[repos]]
repo = "builtin"
hooks = [
  { id = "check-executables-have-shebangs" },
  { id = "check-json" },
  { id = "check-merge-conflict" },
  { id = "check-symlinks" },
  { id = "check-toml" },
  { id = "check-yaml", args = ["--allow-multiple-documents"] },
  { id = "detect-private-key" },
  { id = "end-of-file-fixer" },
  { id = "fix-byte-order-marker" },
  { id = "mixed-line-ending" },
  { id = "trailing-whitespace" },
]

[[repos]]
repo = "meta"
hooks = [{ id = "check-useless-excludes" }]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.9"
hooks = [{ id = "ruff-check" }, { id = "ruff-format" }]

[[repos]]
repo = "https://github.com/codespell-project/codespell"
rev = "v2.4.2"
hooks = [{ id = "codespell" }]

[[repos]]
repo = "https://github.com/JoC0de/pre-commit-prettier"
rev = "v3.8.1"
hooks = [{ id = "prettier", types_or = ["css", "javascript", "json", "yaml"] }]

[[repos]]
repo = "https://github.com/rvben/rumdl-pre-commit"
rev = "v0.1.66"
hooks = [{ id = "rumdl" }, { id = "rumdl-fmt" }]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.11.3"
hooks = [{ id = "uv-lock" }]

[[repos]]
# Only on the single file data/page.html
repo = "https://github.com/djlint/djLint"
rev = "v1.36.4"
hooks = [
  { id = "djlint-reformat", types = ["html"], files = "data/page.html" },
  { id = "djlint", types = ["html"], files = "data/page.html" }
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "build",
    name = "Check build script works correctly",
    entry = "scripts/build.py",
    language = "system",
    pass_filenames = false,
    stages = ["pre-push"],
    always_run = true,
  }
]
